version: '3.7'

services:
  main:
    container_name: vaults-api-main
    build: ./
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=postgres
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: vaults-api-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=postgres
    ports:
      - '${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  worker:
    container_name: vaults-api-worker
    build: ./
    command: node dist/worker-entry.js
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=postgres
    ports:
      - "${WORKER_PORT:-3001}:${WORKER_PORT:-3001}"
    depends_on:
      - postgres

volumes:
  postgres_data:
